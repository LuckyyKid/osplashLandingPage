<section id="contact" class="bg-slate-50 px-5 py-24 sm:px-8 lg:px-10">
  <div class="mx-auto grid max-w-7xl gap-10 lg:grid-cols-[0.9fr_1.1fr] lg:items-start">
    <div class="lg:sticky lg:top-32">
      <p class="text-xs font-bold uppercase tracking-[0.22em] text-[#365A76]">Demande de devis</p>
      <h2 class="mt-4 text-4xl font-semibold leading-tight tracking-normal text-osplashDark sm:text-5xl">
        Parlez-nous de votre projet de nettoyage extérieur.
      </h2>
      <p class="mt-5 max-w-xl text-base leading-8 text-slate-600">
        Remplissez le formulaire et l’équipe O’Splash vous contactera avec une estimation claire selon le service, l’adresse et les détails de la demande.
      </p>

      <div class="mt-8 rounded-2xl border border-osplashBorder bg-white p-6 shadow-sm">
        <p class="text-sm font-semibold text-osplashDark">Besoin de parler à quelqu’un maintenant ?</p>
        <a class="mt-3 inline-flex text-sm font-bold text-[#365A76] hover:text-[#2F4B61]" href="tel:+15145550123">
          Appelez-nous au +1 514 555-0123
        </a>
      </div>
    </div>

    <form class="rounded-2xl border border-osplashBorder bg-white p-6 shadow-sm sm:p-8" action="mailto:info@osplash.ca" method="post" enctype="text/plain">
      <div class="grid gap-5 sm:grid-cols-2">
        <label class="block">
          <span class="text-sm font-semibold text-osplashDark">Nom complet</span>
          <input
            class="mt-2 w-full rounded-xl border border-osplashBorder bg-white px-4 py-3 text-sm text-osplashDark outline-none transition placeholder:text-slate-400 focus:border-[#365A76] focus:ring-4 focus:ring-[#365A76]/10"
            type="text"
            name="nom"
            placeholder="Votre nom"
            required
          />
        </label>

        <label class="block">
          <span class="text-sm font-semibold text-osplashDark">Téléphone</span>
          <input
            class="mt-2 w-full rounded-xl border border-osplashBorder bg-white px-4 py-3 text-sm text-osplashDark outline-none transition placeholder:text-slate-400 focus:border-[#365A76] focus:ring-4 focus:ring-[#365A76]/10"
            type="tel"
            name="telephone"
            placeholder="Votre numéro"
            required
          />
        </label>

        <label class="block sm:col-span-2">
          <span class="text-sm font-semibold text-osplashDark">Adresse du service</span>
          <input
            class="mt-2 w-full rounded-xl border border-osplashBorder bg-white px-4 py-3 text-sm text-osplashDark outline-none transition placeholder:text-slate-400 focus:border-[#365A76] focus:ring-4 focus:ring-[#365A76]/10"
            type="text"
            name="adresse"
            placeholder="Adresse complète"
            required
          />
        </label>

        <label class="block">
          <span class="text-sm font-semibold text-osplashDark">Service souhaité</span>
          <select
            class="mt-2 w-full rounded-xl border border-osplashBorder bg-white px-4 py-3 text-sm text-osplashDark outline-none transition focus:border-[#365A76] focus:ring-4 focus:ring-[#365A76]/10"
            name="service"
            required
          >
            <option value="">Sélectionnez un service</option>
            @for (service of serviceOptions; track service) {
              <option [value]="service">{{ service }}</option>
            }
          </select>
        </label>

        <label class="block">
          <span class="text-sm font-semibold text-osplashDark">Moment idéal</span>
          <select
            class="mt-2 w-full rounded-xl border border-osplashBorder bg-white px-4 py-3 text-sm text-osplashDark outline-none transition focus:border-[#365A76] focus:ring-4 focus:ring-[#365A76]/10"
            name="moment"
          >
            <option>Le plus tôt possible</option>
            <option>Cette semaine</option>
            <option>Dans les prochaines semaines</option>
            <option>Je veux planifier plus tard</option>
          </select>
        </label>

        <label class="block sm:col-span-2">
          <span class="text-sm font-semibold text-osplashDark">Détails de la demande</span>
          <textarea
            class="mt-2 min-h-36 w-full resize-y rounded-xl border border-osplashBorder bg-white px-4 py-3 text-sm text-osplashDark outline-none transition placeholder:text-slate-400 focus:border-[#365A76] focus:ring-4 focus:ring-[#365A76]/10"
            name="details"
            placeholder="Type de propriété, nombre d’étages, fréquence souhaitée, détails utiles..."
          ></textarea>
        </label>
      </div>

      <button
        class="mt-7 inline-flex w-full items-center justify-center rounded-full bg-osplashBlue px-6 py-4 text-sm font-bold text-white shadow-sm transition hover:bg-[#005F8F] sm:w-auto"
        type="submit"
      >
        Envoyer ma demande de devis
      </button>
    </form>
  </div>
</section>
