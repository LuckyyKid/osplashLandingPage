<section class="bg-white px-5 py-10 sm:px-8 lg:px-10">
  <div class="mx-auto grid max-w-7xl gap-8 rounded-2xl border border-osplashBorder bg-osplashLight/55 p-6 sm:p-8 lg:grid-cols-[1.2fr_1fr] lg:items-center">
    <div>
      <div class="flex flex-wrap items-center gap-3">
        <p class="inline-flex rounded-full border border-osplashBlue/10 bg-white px-4 py-2 text-sm font-semibold text-osplashBlue">
          ★★★★★ 4.9/5 sur Google
        </p>
        <a
          class="inline-flex rounded-full border border-osplashBlue/15 bg-white px-4 py-2 text-sm font-bold text-[#365A76] transition hover:border-osplashBlue/30 hover:text-[#2F4B61]"
          href="https://www.google.com/search?sxsrf=ANbL-n4WO32vOlKslYDN87y73zdfgbyFJQ:1779928498649&si=AL3DRZEsmMGCryMMFSHJ3StBhOdZ2-6yYkXd_doETEE1OR-qOZ3HIe9fbqgO8L5ZLxzOehFngh9mLPApbgqKChLFesZGf4_-S_YRAg01QRahipyeffMh1RZSo2P8ElGXe2cpCDjV7zYQ6MqmXYXkeAq54LG7ThSMww%3D%3D&q=Services+O%27Splash+inc."
          target="_blank"
          rel="noopener noreferrer"
        >
          Voir sur Google
        </a>
      </div>
      <h2 class="mt-4 max-w-3xl text-2xl font-semibold leading-tight text-osplashDark sm:text-3xl">
        Déjà adopté par des propriétaires qui veulent un résultat clair, propre et sans stress.
      </h2>
      <p class="mt-3 text-sm leading-6 text-slate-600">
        Service professionnel, ponctuel et minutieux, basé sur des avis clients Google.
      </p>
    </div>

    <div class="grid gap-3 sm:grid-cols-3 lg:grid-cols-1">
      @for (item of trustItems; track item) {
        <div class="flex items-center gap-3 rounded-full border border-white bg-white px-4 py-3 shadow-sm">
          <span class="flex size-8 items-center justify-center rounded-full bg-osplashGreen/12 text-osplashGreen" aria-hidden="true">✓</span>
          <span class="text-sm font-semibold text-osplashDark">{{ item }}</span>
        </div>
      }
    </div>
  </div>
</section>
