<header class="fixed left-0 right-0 top-4 z-50 px-4">
  <div class="mx-auto flex max-w-7xl items-center justify-between rounded-2xl border border-white/50 bg-white/82 px-5 py-3 shadow-lg shadow-slate-900/8 backdrop-blur-xl sm:px-6">
    <a routerLink="/" class="flex items-center" aria-label="Accueil O'Splash" (click)="closeMenu()">
      <span class="flex size-11 items-center justify-center overflow-hidden rounded-xl border border-slate-200 bg-white p-1.5 shadow-sm">
        <img class="size-full object-contain" src="/assets/images/osplash-logo.webp" alt="Logo O'Splash" />
      </span>
    </a>

    <nav class="hidden items-center gap-8 text-sm font-medium text-[#1F2933] md:flex">
      <a class="transition hover:text-[#365A76]" routerLink="/">Accueil</a>
      <a class="transition hover:text-[#365A76]" routerLink="/services">Nos Services</a>
      <a class="transition hover:text-[#365A76]" routerLink="/about">À propos</a>
      <a class="transition hover:text-[#365A76]" href="/#contact">Contact</a>
      <a class="transition hover:text-[#365A76]" routerLink="/careers">Carrière</a>
    </nav>

    <a
      href="/#contact"
      class="hidden items-center rounded-lg bg-osplashBlue px-5 py-3 text-sm font-semibold text-white shadow-sm transition hover:bg-[#005F8F] md:flex"
    >
      <span>Demander un devis</span>
    </a>

    <button
      class="inline-flex size-11 items-center justify-center rounded-lg border border-slate-200 bg-white text-[#1F2933] shadow-sm md:hidden"
      type="button"
      aria-label="Ouvrir le menu"
      [attr.aria-expanded]="isMenuOpen()"
      (click)="toggleMenu()"
    >
      <span class="relative block h-4 w-5">
        <span class="absolute left-0 top-0 h-0.5 w-5 rounded-full bg-current transition" [class.translate-y-2]="isMenuOpen()" [class.rotate-45]="isMenuOpen()"></span>
        <span class="absolute left-0 top-2 h-0.5 w-5 rounded-full bg-current transition" [class.opacity-0]="isMenuOpen()"></span>
        <span class="absolute left-0 top-4 h-0.5 w-5 rounded-full bg-current transition" [class.-translate-y-2]="isMenuOpen()" [class.-rotate-45]="isMenuOpen()"></span>
      </span>
    </button>
  </div>

  @if (isMenuOpen()) {
    <div class="mx-auto mt-3 max-w-7xl rounded-2xl border border-white/60 bg-white/94 p-3 shadow-xl shadow-slate-900/10 backdrop-blur-xl md:hidden">
      <nav class="flex flex-col gap-1 text-sm font-medium text-[#1F2933]">
        <a class="rounded-xl px-4 py-3 transition hover:bg-slate-50 hover:text-[#365A76]" routerLink="/" (click)="closeMenu()">Accueil</a>
        <a class="rounded-xl px-4 py-3 transition hover:bg-slate-50 hover:text-[#365A76]" routerLink="/services" (click)="closeMenu()">Nos Services</a>
        <a class="rounded-xl px-4 py-3 transition hover:bg-slate-50 hover:text-[#365A76]" routerLink="/about" (click)="closeMenu()">À propos</a>
        <a class="rounded-xl px-4 py-3 transition hover:bg-slate-50 hover:text-[#365A76]" href="/#contact" (click)="closeMenu()">Contact</a>
        <a class="rounded-xl px-4 py-3 transition hover:bg-slate-50 hover:text-[#365A76]" routerLink="/careers" (click)="closeMenu()">Carrière</a>
        <a
          class="mt-2 flex items-center justify-center gap-2 rounded-lg bg-osplashBlue px-5 py-3 text-sm font-semibold text-white transition hover:bg-[#005F8F]"
          href="/#contact"
          (click)="closeMenu()"
        >
          <span>☎</span>
          <span>Demander un devis</span>
        </a>
      </nav>
    </div>
  }
</header>
